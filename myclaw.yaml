# 网关设置
gateway:
  host: 127.0.0.1           # 监听地址，默认只接受本地连接
  port: 18789               # 监听端口

providers:
  # Anthropic（Claude 系列）
  - id: claude
    type: anthropic
    apiKeyEnv: ANTHROPIC_API_KEY
    model: claude-sonnet-4-6
    maxTokens: 4096

  # OpenAI（GPT 系列）
  - id: gpt
    type: openai
    apiKeyEnv: OPENAI_API_KEY
    model: gpt-4o
    temperature: 0.5

  # OpenRouter（聚合平台，可使用各种免费/付费模型）
  - id: free-model
    type: openrouter
    apiKeyEnv: OPENROUTER_API_KEY
    baseUrl: https://openrouter.ai/api/v1
    model: openrouter/free

defaultProvider: free-model

routing:
  - channel: my-feishu     # 飞书消息 → 使用 GPT
    agent: free-model
  - channel: "*"           # 其他所有通道 → 使用默认 Provider
    agent: free-model

channels:
  # 终端通道（开发调试用）
  - id: "terminal"
    type: "terminal"
    enabled: true
    greeting: "MyClaw AI assistant"

  # 飞书通道
  - id: "my-feishu"
    type: "feishu"
    enabled: true
    appIdEnv: "FEISHU_APP_ID"         # 从环境变量读取 App ID
    appSecretEnv: "FEISHU_APP_SECRET"  # 从环境变量读取 App Secret
    greeting: "MyClaw AI assistant"

#Agent行为设置
agent:
  name: MyClaw               # Bot 显示名称
  maxHistoryMessages: 50     # 上下文窗口保留的最大消息数
  toolApproval: true         # 执行工具前是否需要用户确认

